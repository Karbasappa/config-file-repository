server:
  port: 8081
spring:
  application:
    name: sab-process-service
  boot:
    main:
      banner-mode: on
    admin:
      client:
        enabled: true
        url: http://sab-dashboard-service:9001
        period: 10s
        instance:
          #name: ${spring.application.name}
          #hostname: localhost
          service-base-url: http://sab-process-service:8081/
        prefer-ip: true
        service-host-type: ip

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    url: jdbc:mysql://host.docker.internal:3306/z_dev-sabtok-1
    password: admin1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: 'true'
    #database-platform: org.hibernate.dialect.MySQL8Dialect


management:
  endpoints:
    web:
      exposure:
        include: 'health,info,threaddump,metrics,loggers,heapdump'
  endpoint:
    health:
      show-details: always
eureka:
  client:
    register-with-eureka: true
    service-url.defaultZone: http://registry:8761/eureka

sab:
  info:
    service:
      url: http://host.docker.internal:8080/sab-info-services-5
  exceed:
    service:
      url: http://host.docker.internal:5001

  cache:
    type: redis
    data:
      redis:
        host: docker.internal  # Change to host.docker.internal if the client is also in Docker
        port: 6379
        connection-timeout: 500ms
        time-to-live: 500ms
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 500ms
        cache-null-values: false
        use-key-prefix: true
        #key-prefix: sab-process-service:
        #lettuce:
        #shutdown-timeout: 200ms
      
      

