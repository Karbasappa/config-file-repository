server:
  port: 8081
spring:
  application:
    name: sab-process-service
  boot:
    main:
      banner-mode: on
    admin:
      client:
        enabled: true
        url: http://localhost:9001
        period: 10s
        instance:
          #name: ${spring.application.name}
          hostname: localhost
          service-url: http://localhost:8081/
        prefer-ip-address: true
        service-host-type: ip

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    url: jdbc:mysql://localhost:3306/z_dev-sabtok-1
    password: admin1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: 'true'
    #database-platform: org.hibernate.dialect.MySQL8Dialect


management:
  endpoints:
    web:
      exposure:
        include: 'health,info,threaddump,metrics,loggers,heapdump'
  endpoint:
    health:
      show-details: always

eureka:
  client:
    register-with-eureka: true
    service-url.defaultZone: http://localhost:8761/eureka

sab:
  info:
    service:
      url: http://laptop-paulleg2:8080/sab-info-services-5
  exceed:
    service:
      url: http://laptop-paulleg2:5001

