env: STAGE
server:
  error:
    include-stacktrace: NEVER
  port: 8081
  servlet:
    context-path: /wiki
spring:
  application:
    name: sab-info-services
  boot:
    main:
      banner-mode: on
    admin:
      client:
        enable: true
        url: http://localhost:9091
        period: 10s
        instance:
          #name: ${spring.application.name}
          #hostname: localhost
          service-base-url: http://host.docker.internal:8081
        #prefer-ip-address: true
        service-host-type: ip
  jpa:
    generate-ddl: 'true'
    hibernate:
      ddl-auto: update
  main:
    banner-mode: log
  datasource:
    tomcat:
      initialSize: '20'
      max-active: '25'
    password: admin1
    driver-class-name: com.mysql.jdbc.Driver
    username: root
    url: jdbc:mysql://localhost:3306/stage_sabwiki
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
linkage:
  scheduler:
    user:
      story:
        cron: 0 */5 * ? * *
    incident:
      cron: 0 */5 * ? * *
feign:
  client:
    exceed:
      url: http://laptop-paulleg2:5001
    plm:
      url: http://laptop-paulleg2:8080/sab-plm-services-2.6
logging:
  path: logs
  file: logs/mylog.log