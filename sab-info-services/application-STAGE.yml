env: STAGE
server:
  error:
    include-stacktrace: NEVER
  port: 8081
  servlet:
    context-path: /sab-info-services-5
spring:
  application:
    name: sab-info-services
  boot:
    main:
      banner-mode: on
    admin:
      client:
        enable: true
        url: http://sab-dashboard-service:9091
        period: 10s
        instance:
          #name: ${spring.application.name}
          #hostname: localhost
          service-base-url: http://sab-info-services:8081
        #prefer-ip-address: true
        service-host-type: ip
  jpa:
    generate-ddl: 'true'
    hibernate:
      ddl-auto: update
  main:
    banner-mode: log
  datasource:
    tomcat:
      initialSize: '20'
      max-active: '25'
    password: admin1
    driver-class-name: com.mysql.jdbc.Driver
    username: root
    url: jdbc:mysql://host.docker.internal:3306/sabwiki_production_01_oct_2023
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  redis:
    host: redis          # Use 'localhost' for local development or 'redis' for Docker networks
    port: 6379           # Standard default Redis communication port
    password:            # Leave blank if no password is set on your Redis instance
    timeout: 2000ms      # Socket connection timeout duration
    lettuce:
      pool:
        max-active: 8    # Maximum number of active connections in the pool
        max-idle: 8      # Maximum number of idle connections in the pool
        min-idle: 0      # Minimum number of idle connections to maintain
        max-wait: -1ms   # Maximum time to wait for a connection (negative means block indefinitely)
linkage:
  scheduler:
    user:
      story:
        cron: 0 */5 * ? * *
    incident:
      cron: 0 */5 * ? * *
feign:
  client:
    exceed:
      url: http://host.docker.internal:5001
    plm:
      url: http://host.docker.internal:8080/sab-plm-services-2.6
logging:
  structured:
    format: ecs # Generates machine-readable JSON logs [2]
  file:
    name: logs/application.log
    path: logs
cross-origin: '*'
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

eureka:
  client:
    register-with-eureka: true
    service-url.defaultZone: http://registry:8761/eureka