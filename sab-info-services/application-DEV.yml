env: dev
server:
  error:
    include-stacktrace: NEVER
  port: 8081
  servlet:
    context-path: /sab-info-services-5
spring:
  application:
    name: sab-info-services
  boot:
    main:
      banner-mode: on
    admin:
      client:
        enable: true
        url: http://localhost:9091
        period: 10s
        instance:
          #name: ${spring.application.name}
          #hostname: localhost
          service-base-url: http://host.docker.internal:8081
        #prefer-ip-address: true
        service-host-type: ip
  jpa:
    generate-ddl: 'true'
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: 'true'
  main:
    banner-mode: log
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    tomcat:
      initialSize: '20'
      max-active: '25'
    password: admin1
    username: root
    url: jdbc:mysql://localhost:3306/z_dev_sabwiki
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
linkage:
  scheduler:
    user:
      story:
        cron: 0 0 * * * *
    incident:
      cron: 0 0 * * * *
logging:
  file: logs/mylog.log
  path: logs
debug: 'true'
security:
  basic:
    enabled: 'false'
  user:
    password: admin
    name: admin
feign:
  client:
    exceed:
      url: http://laptop-paulleg2:5001
    plm:
      url: http://laptop-paulleg2:8080/sab-plm-services-2.6
cross-origin: '*'
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

cache:
  type: none
  data:
    redis:
      host: host.docker.internal  # Change to host.docker.internal if the client is also in Docker
      port: 6379
      connection-timeout: 500ms
      time-to-live: 500ms
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 1
        max-wait: 500ms
      cache-null-values: false
      use-key-prefix: true
      #key-prefix: sab-process-service:
      #lettuce:
      #shutdown-timeout: 200ms